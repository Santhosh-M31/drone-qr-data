<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Delivery 03</title>
</head>
<body>
  <script>
    (async function() {
      const rawUrl = 'https://raw.githubusercontent.com/Santhosh-M31/drone-qr-data/master/Product_Delivery_03.csv';
      const filename = 'Product_Delivery_03.csv';
      const redirectUrl = 'https://www.tecsolutiongroup.com/';
      try {
        const res = await fetch(rawUrl);
        const blob = await res.blob();
        const blobUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = blobUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(blobUrl), 3000);
      } catch (e) {
        const a = document.createElement('a');
        a.href = rawUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      }
      setTimeout(() => { window.location.href = redirectUrl; }, 1500);
    })();
  </script>
</body>
</html>
